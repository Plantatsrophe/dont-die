<!DOCTYPE html>
<html>
<head>
    <title>Glitch Sprite Exporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>
    <script src="glitch_data.js"></script>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        canvas { image-rendering: pixelated; border: 2px solid #555; margin: 10px; }
        #status { margin: 20px; font-size: 1.2em; color: #aaa; }
        #result-container { margin-top: 20px; border-top: 1px solid #444; padding-top: 20px; }
        textarea { width: 100%; height: 100px; display: none; }
    </style>
</head>
<body>
    <h1>Glitch Sprite Exporter</h1>
    <div id="status">Initializing...</div>
    <div id="frames"></div>
    <div id="result-container">
        <div id="gif-result"></div>
        <textarea id="data-out"></textarea>
    </div>

    <script>
        const pal = {
            0: null, 1: '#f1c27d', 2: '#ff2222', 3: '#f1c40f', 4: '#5c4033',
            5: '#050505', 6: '#444444', 7: '#ffffff', 8: '#ffffff', 9: '#00ffff',
            10: '#C0C0C0', 11: '#00cccc', 12: '#8b4513', 13: '#222222', 14: '#3ee855', 15: '#1e90ff', 16: '#5e4533',
            17: '#ff00ff', 18: '#0066ff', 19: '#2ecc71'
        };

        async function startExport() {
            const status = document.getElementById('status');
            status.innerText = "Extracting packed data...";

            // Decode base64 data
            const binary = atob(window.GLITCH_DATA);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

            const frameSize = 4096;
            const frameCount = bytes.length / frameSize;
            const images = [];

            status.innerText = `Rendering ${frameCount} frames...`;

            for (let f = 0; f < frameCount; f++) {
                const canvas = document.createElement('canvas');
                canvas.width = 64;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                
                for (let y = 0; y < 64; y++) {
                    for (let x = 0; x < 64; x++) {
                        const val = bytes[f * frameSize + (y * 64 + x)];
                        if (val !== 0 && pal[val]) {
                            ctx.fillStyle = pal[val];
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                }
                
                // Scale up for better GIF quality
                const bigCanvas = document.createElement('canvas');
                bigCanvas.width = 256; bigCanvas.height = 256;
                const bigCtx = bigCanvas.getContext('2d');
                bigCtx.imageSmoothingEnabled = false;
                bigCtx.drawImage(canvas, 0, 0, 256, 256);
                
                images.push(bigCanvas.toDataURL('image/png'));
                document.getElementById('frames').appendChild(bigCanvas);
            }

            status.innerText = "Encoding GIF (this may take a few seconds)...";

            gifshot.createGIF({
                images: images,
                interval: 0.2, // 200ms
                gifWidth: 256,
                gifHeight: 256,
                pixelated: true
            }, function (obj) {
                if (!obj.error) {
                    const preview = document.createElement('img');
                    preview.src = obj.image;
                    document.getElementById('gif-result').appendChild(preview);
                    
                    const out = document.getElementById('data-out');
                    out.value = obj.image;
                    out.style.display = 'block';

                    status.innerText = "EXPORT COMPLETE! Copy the Base64 below.";
                    
                    // Signal to subagent
                    document.title = "FINISH_EXPORT";
                } else {
                    status.innerText = "ERROR: " + obj.error;
                }
            });
        }

        window.onload = startExport;
    </script>
</body>
</html>
