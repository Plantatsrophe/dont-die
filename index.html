<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Don't Die</title>
    <link rel="stylesheet" href="style.css?v=105">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="src/assets/images/icon.svg" type="image/svg+xml">
</head>

<body>
    <div id="app-wrapper">
        <div id="game-container">
            <!-- Internal resolution of 800x600 -->
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
        
        <!-- Ergonomic Virtual Touch Joypad decoupled dynamically -->
        <div id="touch-controls">
            <div class="dpad">
                <div id="btn-up" class="touch-btn">˄</div>
                <div class="dpad-row">
                    <div id="btn-left" class="touch-btn">&lt;</div>
                    <div id="btn-down" class="touch-btn">˅</div>
                    <div id="btn-right" class="touch-btn">&gt;</div>
                </div>
            </div>
            <div id="btn-jump" class="touch-btn space-btn">SPACE</div>
        </div>
    </div>

    <script type="module" src="src/data/db.js?v=105"></script>
    <script type="module" src="src/main.js?v=105"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=105')
                    .then(reg => console.log('Service Worker registered explicitly!'))
                    .catch(err => console.log('Service Worker registration failed structurally: ', err));
            });
        }
    </script>
</body>

</html>
