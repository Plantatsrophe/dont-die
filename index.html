<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Don't Die</title>
    <link rel="stylesheet" href="style.css?v=389">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="src/assets/images/icon.svg" type="image/svg+xml">
</head>

<body>
    <div id="app-wrapper">
        <!-- 
            PLATFORMER ENGINE VIEWPORT
            The game uses a fixed 800x600 internal resolution.
            The CSS (style.css) handles scaling this canvas to fit the browser window 
            while maintaining the 4:3 aspect ratio and applying CRT filters.
        -->
        <div id="game-container">
            <!-- Internal resolution of 800x600 -->
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
        
        <!-- Ergonomic Virtual Touch Joypad decoupled dynamically -->
        <div id="touch-controls">
            <div class="dpad">
                <div id="btn-up" class="touch-btn">˄</div>
                <div class="dpad-row">
                    <div id="btn-left" class="touch-btn">&lt;</div>
                    <div id="btn-down" class="touch-btn">˅</div>
                    <div id="btn-right" class="touch-btn">&gt;</div>
                </div>
            </div>
            <div id="btn-jump" class="touch-btn space-btn">SPACE</div>
        </div>
    </div>

    <script type="module" src="src/dist/data/db.js?v=389"></script>
    <script type="module" src="src/dist/main.js?v=389"></script>
    <script>
        const CURRENT_VERSION = 'v368';
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // AGGRESSIVE PURGE: Kill any Service Worker that doesn't match EXACTLY
                navigator.serviceWorker.getRegistrations().then(regs => {
                    let reloadNeeded = false;
                    for(let reg of regs) {
                        const swUrl = reg.active ? reg.active.scriptURL : '';
                        if (!swUrl.includes(CURRENT_VERSION)) {
                            reg.unregister();
                            reloadNeeded = true;
                            console.log('[Cache Purge] Unregistered stale worker:', swUrl);
                        }
                    }
                    if (reloadNeeded) {
                        console.log('[Cache Purge] Force reloading for version sync...');
                        window.location.reload();
                    }
                });

                navigator.serviceWorker.register('./sw.js?v=389')
                    .then(reg => {
                        console.log('Service Worker registered explicitly at v368');
                        // Ensure update is found immediately
                        reg.update();
                    })
                    .catch(err => console.error('SW Error:', err));
            });
        }
    </script>
</body>

</html>
