<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Bit Platformer Alpha</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- Internal resolution of 800x600 -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <img id="logoImg" src="images/Grfc%20white.png" style="display:none;">
        
        <!-- Virtual Touch Joypad natively overlaid -->
        <div id="touch-controls">
            <div id="btn-left" class="touch-btn">&lt;</div>
            <div id="btn-right" class="touch-btn">&gt;</div>
            <div id="btn-space"></div>
            <div id="btn-jump" class="touch-btn">˄</div>
        </div>
    </div>
    <script src="globals.js?v=3"></script>
    <script src="levels.js?v=3"></script>
    <script src="assets.js?v=3"></script>
    <script src="audio.js?v=3"></script>
    <script src="physics.js?v=3"></script>
    <script src="render.js?v=3"></script>
    <script src="game.js?v=3"></script>
</body>

</html>
