<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Don't Die</title>
    <link rel="stylesheet" href="style.css?v=21">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>

<body>
    <div id="app-wrapper">
        <div id="game-container">
            <!-- Internal resolution of 800x600 -->
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <img id="logoImg" src="images/Grfc%20white.png" style="display:none;">
        </div>
        
        <!-- Ergonomic Virtual Touch Joypad decoupled dynamically -->
        <div id="touch-controls">
            <div class="dpad">
                <div id="btn-up" class="touch-btn">˄</div>
                <div class="dpad-row">
                    <div id="btn-left" class="touch-btn">&lt;</div>
                    <div id="btn-down" class="touch-btn">˅</div>
                    <div id="btn-right" class="touch-btn">&gt;</div>
                </div>
            </div>
            <div id="btn-jump" class="touch-btn space-btn">SPACE</div>
        </div>
    </div>
    <script type="module" src="db.js?v=70"></script>
    <script src="globals.js?v=70"></script>
    <script src="levels.js?v=70"></script>
    <script src="assets.js?v=70"></script>
    <script src="audio.js?v=70"></script>
    <script src="physics.js?v=70"></script>
    <script src="render.js?v=70"></script>
    <script src="game.js?v=70"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log('PWA Ready'));
        }
    </script>
</body>

</html>
